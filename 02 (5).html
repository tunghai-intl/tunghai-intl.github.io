    // --- 滾動進入視窗之動畫組件 ---
    const FadeIn = ({ children, delay = 0, direction = 'up', className = '' }) => {
      const [isVisible, setVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setVisible(true);
              observer.unobserve(domRef.current);
            }
          });
        }, { threshold: 0.1 });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => { if (domRef.current) observer.unobserve(domRef.current); }
      }, []);

      const directionClasses = {
        up: 'translate-y-12',
        down: '-translate-y-12',
        left: 'translate-x-12',
        right: '-translate-x-12',
        none: ''
      };

      return (
        <div 
          ref={domRef} 
          className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0 translate-x-0' : `opacity-0 ${directionClasses[direction]}`} ${className}`} 
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    };

                          src={equip.img} 
                          alt={equip.name} 
                          className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700"
                        />
                        <div className="absolute bottom-4 right-4 bg-slate-950/80 backdrop-blur-sm p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20">
                          <IconPlay className="w-4 h-4 text-cyan-400" />
                        </div>
                      </div>
                      <div className="p-6 relative z-20 bg-slate-900">
                        <div className="text-xs text-cyan-500 mb-1 font-mono">{equip.model}</div>
                        <h4 className="text-lg font-bold text-white mb-2">{equip.name}</h4>
                        <p className="text-slate-400 text-sm line-clamp-2">{equip.desc}</p>
                      </div>
                    </div>
                  </FadeIn>
                ))}
              </div>
            </div>
          </section>

          {/* 設備詳細對話視窗 (Modal) */}
          {selectedEquip && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-slate-950/85 backdrop-blur-sm" onClick={() => setSelectedEquip(null)}></div>
              <div className="bg-slate-900 border border-slate-700 rounded-xl max-w-4xl w-full text-white relative z-10 overflow-hidden flex flex-col md:flex-row shadow-2xl animate-modal-in">
                <button 
                  className="absolute top-4 right-4 z-20 bg-slate-950/50 p-2 rounded-full hover:bg-cyan-600 transition-colors"
                  onClick={() => setSelectedEquip(null)}
                >
                  <IconX className="w-5 h-5" />
                </button>
                <div className="w-full md:w-1/2 h-64 md:h-auto bg-slate-950">
                  <SafeImage src={selectedEquip.img} alt={selectedEquip.name} className="w-full h-full object-cover" />
                </div>
                <div className="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                  <div className="text-cyan-500 font-mono text-sm mb-2">{selectedEquip.model}</div>
                  <h3 className="text-2xl md:text-3xl font-bold mb-6">{selectedEquip.name}</h3>
                  <p className="text-slate-300 leading-relaxed mb-8 text-sm md:text-base">{selectedEquip.desc}</p>
                  
                  <div className="bg-slate-950 border border-slate-800 rounded-lg p-4">
                    <div className="text-xs text-slate-500 uppercase tracking-wider mb-1 font-mono">{t('capabilityLabel')}</div>
                    <div className="text-xl font-bold text-white font-mono">{selectedEquip.precision}</div>
                  </div>
                  
                  <button className="mt-8 bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-sm transition-colors self-start text-sm font-semibold">
                    {t('contactBtn')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- 檢驗認證流程 --- */}
          <section className="py-20 bg-gradient-to-b from-slate-950 to-slate-900 border-y border-slate-800">
            <div className="container mx-auto px-6 text-center">
              <FadeIn>
                <IconShieldCheck className="w-16 h-16 text-slate-700 mx-auto mb-6" />
                <h2 className="text-2xl md:text-3xl font-bold text-white mb-8">{t('qcTitle')}</h2>
                <div className="flex flex-wrap justify-center gap-4 md:gap-12">
                  {['IQC', 'IPQC', 'FQC', 'OQC'].map((step, i) => (
                    <div key={i} className="flex items-center gap-2 text-slate-400 font-medium font-mono text-base md:text-lg bg-slate-900/50 border border-slate-800 px-6 py-3 rounded-md">
                      <IconCheckCircle2 className="w-5 h-5 text-cyan-500" />
                      {step}
                    </div>
                  ))}
                </div>
              </FadeIn>
            </div>
          </section>

          {/* --- 最新消息 --- */}
          <section id="news" className="py-24 bg-slate-900">
            <div className="container mx-auto px-6">
              <FadeIn>
                <div className="text-center mb-16">
                  <h3 className="text-cyan-500 text-sm font-bold tracking-widest uppercase mb-2 font-mono">{t('newsSubtitle')}</h3>
                  <h2 className="text-3xl font-bold text-white">{t('newsTitle')}</h2>
                </div>
              </FadeIn>

              <div className="grid md:grid-cols-3 gap-8">
                {news.map((item, idx) => (
                  <FadeIn key={idx} delay={idx * 100} direction="up">
                    <div className="bg-slate-950 border border-slate-800 rounded-lg p-8 hover:border-slate-600 transition-colors group cursor-pointer h-full flex flex-col">
                      <div className="flex justify-between items-center mb-4 text-sm">
                        <span className="text-cyan-500 font-mono">{item.date}</span>
                        <span className="bg-slate-800 text-slate-300 px-3 py-1 rounded-full text-xs font-medium">{item.category}</span>
                      </div>
                      <h4 className="text-lg font-bold text-white leading-relaxed mb-6 group-hover:text-cyan-400 transition-colors">
                        {item.title}
                      </h4>
                      <div className="mt-auto flex items-center text-slate-500 text-sm group-hover:text-white transition-colors font-medium">
                        {t('newsReadMore')} <IconArrowRight className="w-4 h-4 ml-2 transform group-hover:translate-x-1 transition-transform" />
                      </div>
                    </div>
                  </FadeIn>
                ))}
              </div>
            </div>
          </section>

          {/* --- 聯絡留言表單區 --- */}
          <section id="contact-form" className="relative z-20 py-20 bg-slate-900">
            <div className="container mx-auto px-6">
              <div className="grid lg:grid-cols-5 gap-12">
                {/* 左側聯絡資訊 */}
                <div className="lg:col-span-2 space-y-8 bg-slate-100/95 text-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-200 relative z-20">
                  <FadeIn>
                    <h2 className="text-2xl md:text-3xl font-bold text-slate-950">
                      {lang === 'zh' ? '立即與我們聯繫' : lang === 'en' ? 'Get in Touch with Us' : '今すぐお問い合わせください'}
                    </h2>
                    <p className="text-slate-600 text-sm leading-relaxed">
                      {lang === 'zh' ? '有任何加工、採購或整合的問題，我們的工程窗口已準備好與您討論。' : lang === 'en' ? 'Any machining, sourcing, or integration questions—our engineering team is ready to assist.' : 'ご質問・ご相談がございましたら、いつでもお気軽にお問い合わせください。'}
                    </p>
                  </FadeIn>

                  <div className="space-y-4">
                    <div className="flex items-start gap-4">
                      <IconPhone className="w-5 h-5 text-cyan-500 shrink-0 mt-1" />
                      <div>
                        <div className="text-slate-900 font-semibold">0986-537266</div>
                        <div className="text-xs text-slate-500 mt-1">{t('officeHour')}</div>
                      </div>
                    </div>
                    <div className="flex items-start gap-4">
                      <IconMail className="w-5 h-5 text-cyan-500 shrink-0 mt-1" />
                      <a href="mailto:tunghai12908823@gmail.com" className="text-slate-700 hover:text-cyan-500 transition-colors">
                        tunghai12908823@gmail.com
                      </a>
                    </div>
                    <div className="flex items-start gap-4">
                      <IconMapPin className="w-5 h-5 text-cyan-500 shrink-0 mt-1" />
                      <div className="text-slate-700 text-sm">
                        {lang === 'zh' ? '43641臺中市清水區和睦路三段250號' : lang === 'en' ? '1 F., No. 250, Sec. 3, Hemu Rd., Qingshui Dist., Taichung City 43641, Taiwan' : '台湾 43641 台中市清水区和睦路三段250号'}
                      </div>
                    </div>
                    <div className="flex items-start gap-4">
                      <IconMapPin className="w-5 h-5 text-cyan-500 shrink-0 mt-1" />
                      <div>
                        <div className="text-slate-900 font-semibold">{lang === 'zh' ? '官方 LINE 線上聯繫' : lang === 'en' ? 'Official LINE real-time support' : '公式LINEで即時対応'}</div>
                        <div className="text-xs text-slate-500 mt-1">@526vmfhc</div>
                        <img
                          src="https://raw.githubusercontent.com/tunghai-intl/tunghai-intl.github.io/refs/heads/main/L_barcodes.png"
                          alt="LINE QR code"
                          className="mt-3 w-36 sm:w-44 md:w-48 rounded-lg border border-slate-300 shadow-sm"
                        />
                      </div>
                    </div>
                  </div>
                </div>

                {/* 右側聯絡表單 */}
                <div className="lg:col-span-3">
                  <div className="bg-white text-slate-800 rounded-lg p-8 shadow-lg relative z-20 pointer-events-auto">
                    {contactSubmitted ? (
                      <div className="text-center py-12 space-y-4">
                        <div className="inline-flex items-center justify-center p-3 bg-green-100 rounded-full text-green-600">
                          <IconCheckCircle2 className="w-10 h-10" />
                        </div>
                        <h3 className="text-xl font-bold text-slate-900">
                          {lang === 'zh' ? '留言表單已成功送出！' : lang === 'en' ? 'Message Sent Successfully!' : 'メッセージを送信しました！'}
                        </h3>
                        <p className="text-sm text-slate-600">
                          {lang === 'zh' ? '感謝您的信賴，我們負責對接的工程窗口將在最短時間內回信或與您取得電話聯繫。' : lang === 'en' ? 'Thank you for reaching out. Our engineering team will contact you shortly.' : 'ご利用ありがとうございます。担当エンジニアより早速ご連絡申し上げます。'}
                        </p>
                        <button 
                          onClick={() => setContactSubmitted(false)}
                          className="mt-4 text-xs font-semibold bg-slate-900 text-white hover:bg-slate-800 px-5 py-2.5 rounded transition"
                        >
                          {lang === 'zh' ? '撰寫新訊息' : lang === 'en' ? 'Send Another Message' : '別のメッセージを送信'}
                        </button>
                      </div>
                    ) : (
                      <form onSubmit={submitContact} className="space-y-5">
                        <div>
                          <h3 className="text-lg font-bold text-slate-900">
                            {lang === 'zh' ? '歡迎留言您的需求，我們將與您聯繫' : lang === 'en' ? 'Send Us Your Message' : 'メッセージフォーム'}
                          </h3>
                          <p className="text-xs text-slate-500 mt-1">
                            {lang === 'zh' ? '如果您需要快速留言，亦可在官方 LINE 線上聯繫。' : lang === 'en' ? 'We will respond promptly via phone or email.' : 'メッセージをお送りいただくと、担当者より電話またはメールにてご返答いたします。'}
                          </p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                              {lang === 'zh' ? '聯絡人稱呼 / 職稱 *' : lang === 'en' ? 'Name / Title *' : 'お名前 / ご職位 *'}
                            </label>
                            <input 
                              type="text" 
                              required 
                              value={contactForm.name}
                              onChange={(e) => setContactForm({...contactForm, name: e.target.value})}
                              placeholder={lang === 'zh' ? '例如：李經理 / 王先生' : lang === 'en' ? 'e.g. Manager Lee' : '例：田中 太郎'}
                              className="w-full text-sm bg-slate-50 border border-slate-300 rounded px-3 py-2 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                            />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                              {lang === 'zh' ? '電話 / 手機 *' : lang === 'en' ? 'Phone / Mobile *' : '電話番号 *'}
                            </label>
                            <input 
                              type="text" 
                              required 
                              value={contactForm.phone}
                              onChange={(e) => setContactForm({...contactForm, phone: e.target.value})}
                              placeholder={lang === 'zh' ? '例如：0912-345-678' : lang === 'en' ? 'e.g. +886-912-345-678' : '例：09-1234-5678'}
                              className="w-full text-sm bg-slate-50 border border-slate-300 rounded px-3 py-2 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                            />
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                            {lang === 'zh' ? '電子信箱 Email (便於寄送報價單)' : lang === 'en' ? 'Email Address' : 'メールアドレス'}
                          </label>
                          <input 
                            type="email" 
                            value={contactForm.email}
                            onChange={(e) => setContactForm({...contactForm, email: e.target.value})}
                            placeholder="username@company.com"
                            className="w-full text-sm bg-slate-50 border border-slate-300 rounded px-3 py-2 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                          />
                        </div>

                        <div>
                          <label className="block text-xs font-semibold text-slate-700 mb-1.5">
                            {lang === 'zh' ? '需求細節說明 / 加工尺寸與數量備註' : lang === 'en' ? 'Message Details' : 'ご要望・ご質問'}
                          </label>
                          <textarea 
                            rows="4" 
                            required 
                            value={contactForm.message}
                            onChange={(e) => setContactForm({...contactForm, message: e.target.value})}
                            placeholder={lang === 'zh' ? '請描述您的加工需求（如：希望加工不鏽鋼銷柱50件、需染黑、或者代工組裝零件...等）。' : lang === 'en' ? 'Describe your machining or sourcing needs...' : 'ご要望の内容をお聞きかせください。'}
                            className="w-full text-sm bg-slate-50 border border-slate-300 rounded px-3 py-2 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                          />
                        </div>

                        <div className="bg-slate-50 rounded p-3 text-xs text-slate-500">
                          💡 {lang === 'zh' ? '我們對所有客戶的圖面資料與專利細節，均嚴格執行廠內防洩密制度，絕不向第三方泄露。' : lang === 'en' ? 'We strictly protect all client drawings and proprietary information.' : 'お預かりしたご資料は厳密に機密管理いたします。'}
                        </div>

                        <button 
                          type="submit" 
                          disabled={contactSubmitting}
                          className="w-full bg-slate-900 text-white font-semibold py-3 px-4 rounded hover:bg-slate-800 transition shadow flex items-center justify-center space-x-2 disabled:opacity-50"
                        >
                          {contactSubmitting ? (
                            <>
                              <span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                              <span>{lang === 'zh' ? '留言傳送中...' : lang === 'en' ? 'Sending...' : '送信中...'}</span>
                            </>
                          ) : (
                            <span>{lang === 'zh' ? '送出留言聯絡資訊' : lang === 'en' ? 'Send Message' : 'メッセージを送信'}</span>
                          )}
                        </button>
                      </form>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* --- 頁尾與資訊 (Footer) --- */}
          <footer className="bg-slate-900 pt-20 pb-10 border-t border-slate-800">
            <div className="container mx-auto px-6">
              <div className="bg-slate-950 rounded-3xl border border-slate-800 p-10 shadow-2xl">
                <div className="grid lg:grid-cols-4 gap-12 mb-16">
                  <div className="lg:col-span-1 space-y-6">
                    <div className="flex items-center gap-3 mb-6">
                      <IconFactory className="w-8 h-8 text-cyan-500" />
                      <div>
                        <h2 className="text-white font-bold text-xl tracking-wider">東海國際有限公司</h2>
                        <p className="text-[10px] text-slate-400 tracking-widest uppercase font-mono">Tung Hai Int'l Corp.</p>
                      </div>
                    </div>
                    <p className="text-slate-400 text-sm leading-relaxed mb-6">
                      {t('footerDesc')}
                    </p>
                    <div className="flex flex-col gap-2">
                      <span className="text-xs text-slate-500 border border-slate-800 px-2 py-1.5 rounded bg-slate-900/50 w-fit">統一編號: 12908823</span>
                      <span className="text-xs text-slate-500 border border-slate-800 px-2 py-1.5 rounded bg-slate-900/50 w-fit">設立日期: 2021/08/14</span>
                    </div>
                  </div>

                  <div className="lg:col-span-2">
                    <h4 className="text-white font-bold mb-6 text-sm uppercase tracking-wider">{t('footerInfo')}</h4>
                    <ul className="space-y-4">
                      <li className="flex items-start gap-4">
                        <IconPhone className="w-5 h-5 text-cyan-500 shrink-0 mt-0.5" />
                        <div>
                          <div className="text-slate-300 font-semibold">0986-537266</div>
                          <div className="text-xs text-slate-500 mt-1">{t('officeHour')}</div>
                        </div>
                      </li>
                      <li className="flex items-start gap-4">
                        <IconMail className="w-5 h-5 text-cyan-500 shrink-0 mt-0.5" />
                        <a href="mailto:tunghai12908823@gmail.com" className="text-slate-300 hover:text-cyan-400 transition-colors">
                          tunghai12908823@gmail.com
                        </a>
                      </li>
                      <li className="flex items-start gap-4">
                        <IconMapPin className="w-5 h-5 text-cyan-500 shrink-0 mt-0.5" />
                        <div>
                          <div className="text-slate-300">臺中市清水區和睦路三段250號</div>
                          <div className="text-xs text-slate-500 mt-1 uppercase font-mono">
                            1 F., No. 250, Sec. 3, Hemu Rd., Qingshui Dist., Taichung City 43641, Taiwan (R.O.C.)
                          </div>
                        </div>
                      </li>
                      <li className="flex items-start gap-4">
                        <IconGlobe className="w-5 h-5 text-cyan-500 shrink-0 mt-0.5" />
                        <div>
                          <div className="text-slate-300">{lang === 'zh' ? '官方 LINE 線上即時回覆' : lang === 'en' ? 'Official LINE real-time support' : '公式LINEで即時対応'}</div>
                          <div className="text-xs text-slate-500 mt-1">@526vmfhc</div>
                        </div>
                      </li>
                    </ul>
                  </div>

                  <div className="lg:col-span-1">
                    <h4 className="text-white font-bold mb-6 text-sm uppercase tracking-wider">{t('footerLinks')}</h4>
                    <ul className="space-y-3 text-sm">
                      <li><a href="#services" className="text-slate-400 hover:text-cyan-400 transition-colors">{t('navServices')}</a></li>
                      <li><a href="#advantages" className="text-slate-400 hover:text-cyan-400 transition-colors">{t('navAdvantages')}</a></li>
                      <li><a href="#equipment" className="text-slate-400 hover:text-cyan-400 transition-colors">{t('navEquipment')}</a></li>
                      <li><a href="#news" className="text-slate-400 hover:text-cyan-400 transition-colors">{t('navNews')}</a></li>
                    </ul>
                  </div>
                </div>
                <div className="bg-slate-900/80 rounded-b-3xl border-t border-slate-800 pt-8 px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
                  <p className="text-slate-500 text-sm font-mono">
                    © {new Date().getFullYear()} 東海國際有限公司 TUNG HAI INT'L CORP. All Rights Reserved.
                  </p>
                  <div className="flex gap-4 text-slate-500 text-sm">
                    <span className="hover:text-slate-300 cursor-pointer">Privacy Policy</span>
                    <span className="hover:text-slate-300 cursor-pointer">Terms of Service</span>
                  </div>
                </div>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
